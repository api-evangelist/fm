aid: fm
name: FM (FM Global)
description: >-
  FM (formerly FM Global) is a mutual insurance company specializing in
  commercial and industrial property insurance, loss prevention engineering,
  and risk management research. FM operates through six business units
  including FM, FM Affiliated, FM Approvals, FM Boiler Re, FM Cargo, and
  FM Renewable Energy, and is one of the largest commercial property
  insurers in the world. This repository tracks the FM (fm.com) entity
  and any APIs, developer tools, and machine-readable artifacts. The
  abbreviation "FM" is also used in unrelated contexts (Facilities
  Management, FM radio broadcasting, financial management); this
  repository is scoped to the FM Global commercial property insurer that
  owns the fm.com domain. No public APIs or developer programs are
  currently published.
